name: Data Export

on:
  workflow_dispatch:
    inputs:
      view:
        description: "Order view filter"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - pending
          - inprocess
          - completed
          - unapproved
      max_orders:
        description: "Max orders to export (0 = all)"
        required: false
        default: "0"
        type: string
  schedule:
    # Runs Tuesdays at 06:00 and 07:00 UTC; gate below ensures only
    # last Tuesday at 08:00 Europe/Stockholm executes.
    - cron: "0 6 * * 2"
    - cron: "0 7 * * 2"

permissions:
  contents: write

jobs:
  export:
    name: Build latest reports
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EXPORT_USER: ${{ secrets.EXPORT_USER }}
      EXPORT_PASS: ${{ secrets.EXPORT_PASS }}
      EXPORT_BASE_URL: ${{ secrets.EXPORT_BASE_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM: ${{ secrets.RESEND_FROM }}
      RESEND_TO: ${{ secrets.RESEND_TO }}
      EXPORT_VIEW: ${{ github.event.inputs.view }}
      EXPORT_MAX_ORDERS: ${{ github.event.inputs.max_orders }}
    steps:
      - name: Decide schedule window (last Tuesday 08:00 Europe/Stockholm)
        id: schedule_guard
        env:
          TZ: Europe/Stockholm
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Manual trigger -> run export."
            exit 0
          fi

          YEAR="$(date +%Y)"
          MONTH="$(date +%m)"
          TODAY_DAY=$((10#$(date +%d)))
          CURRENT_HOUR=$((10#$(date +%H)))

          LAST_DAY=$((10#$(date -d "${YEAR}-${MONTH}-01 +1 month -1 day" +%d)))
          LAST_DAY_WEEKDAY=$((10#$(date -d "${YEAR}-${MONTH}-${LAST_DAY} 12:00:00" +%u)))
          # Monday=1 ... Sunday=7, Tuesday=2.
          OFFSET=$(((LAST_DAY_WEEKDAY - 2 + 7) % 7))
          LAST_TUESDAY=$((LAST_DAY - OFFSET))

          if [ "${TODAY_DAY}" -eq "${LAST_TUESDAY}" ] && [ "${CURRENT_HOUR}" -eq 8 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Scheduled window matched (last Tuesday 08:00 Stockholm)."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping scheduled run. Today=${TODAY_DAY}, last_tuesday=${LAST_TUESDAY}, hour=${CURRENT_HOUR}"
          fi

      - name: Skip outside monthly execution window
        if: ${{ steps.schedule_guard.outputs.run != 'true' }}
        run: |
          echo "No export this run. Window is last Tuesday each month at 08:00 Europe/Stockholm."

      - name: Checkout repository
        if: ${{ steps.schedule_guard.outputs.run == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Python
        if: ${{ steps.schedule_guard.outputs.run == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: ${{ steps.schedule_guard.outputs.run == 'true' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install openpyxl xlwt

      - name: Validate required secrets
        if: ${{ steps.schedule_guard.outputs.run == 'true' }}
        run: |
          if [ -z "${EXPORT_USER}" ] || [ -z "${EXPORT_PASS}" ] || [ -z "${EXPORT_BASE_URL}" ]; then
            echo "Missing one or more required secrets: EXPORT_USER, EXPORT_PASS, EXPORT_BASE_URL."
            exit 1
          fi

      - name: Run export
        if: ${{ steps.schedule_guard.outputs.run == 'true' }}
        run: |
          VIEW="${EXPORT_VIEW:-all}"
          MAX_ORDERS="${EXPORT_MAX_ORDERS:-0}"
          python order_export.py \
            --base-url "${EXPORT_BASE_URL}" \
            --username "${EXPORT_USER}" \
            --password "${EXPORT_PASS}" \
            --view "${VIEW}" \
            --max-orders "${MAX_ORDERS}" \
            --detail-timeout 120 \
            --detail-retries 4 \
            --detail-sleep 0.25 \
            --output orders_latest.csv \
            --items-output order_items_latest.csv \
            --xlsx-output report_latest.xlsx \
            --xls-output report_latest.xls

      - name: Publish latest XLS to Pages folder
        if: ${{ steps.schedule_guard.outputs.run == 'true' }}
        run: |
          mkdir -p docs/latest
          cp report_latest.xls docs/latest/report_latest.xls
          date -u +"%Y-%m-%dT%H:%M:%SZ" > docs/latest/last_updated_utc.txt

      - name: Commit latest XLS (if changed)
        id: publish
        if: ${{ steps.schedule_guard.outputs.run == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f docs/latest/report_latest.xls docs/latest/last_updated_utc.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update latest report [skip ci]"
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Send email notification (no SMTP, Resend API)
        if: ${{ steps.schedule_guard.outputs.run == 'true' && success() && env.RESEND_API_KEY != '' && env.RESEND_FROM != '' && env.RESEND_TO != '' }}
        env:
          DOWNLOAD_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/latest/report_latest.xls
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          NOW_UTC="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          export NOW_UTC

          PAYLOAD="$(python - <<'PY'
          import json
          import os

          recipients = [x.strip() for x in os.environ["RESEND_TO"].split(",") if x.strip()]
          body = (
              "Ny exportfil finns tillgänglig.\n\n"
              f"Ladda ner: {os.environ['DOWNLOAD_URL']}\n"
              f"Workflow-körning: {os.environ['RUN_URL']}\n"
              f"Tid (UTC): {os.environ['NOW_UTC']}\n"
          )

          print(json.dumps({
              "from": os.environ["RESEND_FROM"],
              "to": recipients,
              "subject": "Ny exportfil tillgänglig",
              "text": body,
          }))
          PY
          )"

          curl -fsS https://api.resend.com/emails \
            -X POST \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}"

      - name: Upload artifacts
        if: ${{ steps.schedule_guard.outputs.run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: data-export-${{ github.run_number }}
          retention-days: 30
          if-no-files-found: error
          path: |
            report_latest.xlsx
            report_latest.xls
            orders_latest.csv
            order_items_latest.csv
