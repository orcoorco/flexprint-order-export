<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FlexPrint Export</title>
  <style>
    :root {
      --bg: #eef4f7;
      --card: #ffffff;
      --ink: #14202b;
      --muted: #4c5e70;
      --brand: #0b7285;
      --brand2: #1696a5;
      --line: #d4dfe8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 5% 15%, #d8e7ee 0%, transparent 34%),
        radial-gradient(circle at 96% 20%, #d4efef 0%, transparent 40%),
        var(--bg);
    }

    main {
      width: min(920px, 92vw);
      margin: 36px auto;
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(20, 32, 43, 0.06);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
      letter-spacing: 0.2px;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      border-radius: 10px;
      border: 1px solid var(--line);
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.2px;
      padding: 10px 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.93rem;
    }

    .btn-primary {
      border: 0;
      color: #fff;
      background: linear-gradient(120deg, var(--brand), var(--brand2));
    }

    .btn-secondary {
      color: var(--ink);
      background: #f4f8fb;
    }

    .meta {
      margin-top: 12px;
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #f4f8fb;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 1px 6px;
    }

    #status {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.55;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.86rem;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>FlexPrint Export</h1>
      <p>Ingen PAT behövs. Ladda ner senaste publicerade XLS direkt.</p>
      <div class="actions">
        <a class="btn btn-primary" href="./latest/flexprint_export_full.xls" download>
          Ladda ner senaste XLS
        </a>
        <a class="btn btn-secondary" target="_blank" rel="noopener noreferrer"
           href="https://github.com/orcoorco/flexprint-order-export/actions/workflows/flexprint-export.yml">
          Generera ny export (GitHub Actions)
        </a>
      </div>
      <div class="meta">
        Fil: <span class="mono">docs/latest/flexprint_export_full.xls</span><br>
        Repo: <span class="mono">orcoorco/flexprint-order-export</span>
      </div>
    </section>

    <section class="card">
      <strong>Publiceringsstatus</strong>
      <div id="status">Läser status...</div>
    </section>
  </main>

  <script>
    async function loadStatus() {
      const statusEl = document.getElementById("status");
      const fileUrl = "./latest/flexprint_export_full.xls";
      const tsUrl = "./latest/last_updated_utc.txt";

      try {
        const [headRes, tsRes] = await Promise.all([
          fetch(fileUrl, { method: "HEAD", cache: "no-store" }),
          fetch(tsUrl, { cache: "no-store" })
        ]);

        const lines = [];
        if (headRes.ok) {
          const length = headRes.headers.get("content-length");
          const modified = headRes.headers.get("last-modified");
          lines.push(`XLS tillgänglig: JA`);
          if (modified) lines.push(`Server last-modified: ${modified}`);
          if (length) lines.push(`Storlek (bytes): ${length}`);
        } else {
          lines.push(`XLS tillgänglig: NEJ (${headRes.status})`);
        }

        if (tsRes.ok) {
          const txt = (await tsRes.text()).trim();
          lines.push(`Senast publicerad (UTC): ${txt}`);
        } else {
          lines.push(`Senast publicerad (UTC): okänd`);
        }

        statusEl.textContent = lines.join("\n");
      } catch (err) {
        statusEl.textContent = `Kunde inte läsa status: ${err.message}`;
      }
    }

    loadStatus();
  </script>
</body>
</html>
